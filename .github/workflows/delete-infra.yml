# delete-infra.yml — Tears down Azure infrastructure for a given environment

name: Delete Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to delete"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      app-name:
        description: "Application name prefix"
        required: false
        default: "northwind2"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  delete:
    name: Delete ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete infrastructure
        shell: pwsh
        run: |
          ./output/infra/delete-infra.ps1 `
            -Environment "${{ inputs.environment }}" `
            -AppName "${{ inputs.app-name }}" `
            -Force
