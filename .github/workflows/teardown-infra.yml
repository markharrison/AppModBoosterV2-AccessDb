# Generated by booster-iac | 2026-04-06 20:14:29
# teardown-infra.yml - Delete Azure infrastructure (resource group deletion)
# Auth: OIDC federated credentials (no AZURE_CREDENTIALS secret)

name: Teardown Infrastructure

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment to tear down"
                required: true
                type: choice
                options:
                    - dev
                    - staging
                    - prod
            confirm:
                description: "Type the environment name again to confirm deletion"
                required: true
                type: string

permissions:
    id-token: write # Required for OIDC
    contents: read

jobs:
    teardown:
        name: Teardown Infrastructure (${{ inputs.environment }})
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}

        steps:
            - name: Validate confirmation input
              run: |
                  if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
                    echo "ERROR: Confirmation input '${{ inputs.confirm }}' does not match environment '${{ inputs.environment }}'."
                    exit 1
                  fi
                  echo "Confirmation valid. Proceeding with teardown of rg-accessdbapp-${{ inputs.environment }}."

            - name: Login to Azure (OIDC)
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Delete resource group
              run: |
                  RESOURCE_GROUP="rg-accessdbapp-${{ inputs.environment }}"
                  if az group exists --name "$RESOURCE_GROUP" | grep -q true; then
                    echo "Deleting resource group: $RESOURCE_GROUP"
                    az group delete \
                      --name "$RESOURCE_GROUP" \
                      --yes \
                      --no-wait
                    echo "Deletion initiated for: $RESOURCE_GROUP"
                  else
                    echo "Resource group $RESOURCE_GROUP does not exist. Nothing to delete."
                  fi
