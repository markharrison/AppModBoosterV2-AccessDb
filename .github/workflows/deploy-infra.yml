# deploy-infra.yml — Provisions Azure infrastructure for a given environment

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      location:
        description: "Azure region"
        required: false
        default: "eastus2"
        type: string
      app-service-sku:
        description: "App Service Plan SKU"
        required: false
        default: "B1"
        type: string
      app-name:
        description: "Application name prefix"
        required: false
        default: "northwind2"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        shell: pwsh
        run: |
          ./output/infra/deploy-infra.ps1 `
            -Environment "${{ inputs.environment }}" `
            -Location "${{ inputs.location }}" `
            -AppServiceSku "${{ inputs.app-service-sku }}" `
            -AppName "${{ inputs.app-name }}"

      - name: Grant database access
        shell: pwsh
        run: |
          ./output/infra/grant-db-access.ps1 `
            -Environment "${{ inputs.environment }}" `
            -AppName "${{ inputs.app-name }}"
