# Generated by booster-iac | 2026-04-06 20:14:29
# deploy-infra.yml - Deploy Azure infrastructure via Bicep
# Auth: OIDC federated credentials (no AZURE_CREDENTIALS secret)

name: Deploy Infrastructure

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - dev
                    - staging
                    - prod
            sql_admin_group_object_id:
                description: "Azure AD group Object ID for SQL Server Entra admin"
                required: true
                type: string
            sql_admin_group_name:
                description: "Azure AD group display name for SQL Server Entra admin"
                required: true
                type: string

permissions:
    id-token: write # Required for OIDC
    contents: read

jobs:
    deploy-infra:
        name: Deploy Infrastructure (${{ inputs.environment }})
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login to Azure (OIDC)
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Create resource group
              run: |
                  az group create \
                    --name "rg-accessdbapp-${{ inputs.environment }}" \
                    --location eastus \
                    --output none

            - name: Deploy Bicep template
              run: |
                  az deployment group create \
                    --resource-group "rg-accessdbapp-${{ inputs.environment }}" \
                    --template-file output/infra/main.bicep \
                    --parameters output/infra/parameters/${{ inputs.environment }}.bicepparam \
                    --parameters sqlAdminGroupObjectId="${{ inputs.sql_admin_group_object_id }}" \
                    --parameters sqlAdminGroupName="${{ inputs.sql_admin_group_name }}" \
                    --name "infra-${{ inputs.environment }}-${{ github.run_number }}" \
                    --output table
