# build-app.yml — Builds both API App and Web App, runs unit tests, publishes artifacts

name: Build Application

on:
  push:
    branches: [main]
    paths:
      - "output/src/**"
      - "output/test/unit/**"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "output/src/**"
      - "output/test/unit/**"
      - ".github/workflows/build-app.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore API App
        run: dotnet restore output/src/ApiApp/ApiApp.csproj

      - name: Build API App
        run: dotnet build output/src/ApiApp/ApiApp.csproj --configuration Release --no-restore

      - name: Restore Web App
        run: dotnet restore output/src/WebApp/WebApp.csproj

      - name: Build Web App
        run: dotnet build output/src/WebApp/WebApp.csproj --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test output/test/unit/ApiApp.Tests.csproj --configuration Release --verbosity normal

      - name: Publish API App
        run: dotnet publish output/src/ApiApp/ApiApp.csproj --configuration Release --output ./publish/api

      - name: Publish Web App
        run: dotnet publish output/src/WebApp/WebApp.csproj --configuration Release --output ./publish/web

      - name: Upload API App artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./publish/api
          retention-days: 7

      - name: Upload Web App artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ./publish/web
          retention-days: 7
