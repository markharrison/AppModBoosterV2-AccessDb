# build-app.yml - Build and test both ApiApp and WebApp

name: Build and Test

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET 10
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - name: Cache NuGet packages
              uses: actions/cache@v4
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget-

            - name: Restore dependencies
              run: dotnet restore AppModBoosterV2x.sln

            - name: Build solution
              run: dotnet build AppModBoosterV2x.sln --configuration Release --no-restore

            - name: Run unit tests (ApiApp)
              run: |
                  dotnet test output/test/unit/ApiApp.Tests.csproj \
                    --configuration Release \
                    --no-build \
                    --logger "trx;LogFileName=unit-test-results.trx" \
                    --results-directory ./test-results

            - name: Upload test results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-results
                  path: ./test-results/*.trx
                  retention-days: 14
