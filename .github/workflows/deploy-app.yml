# Generated by booster-iac | 2026-04-06 20:14:29
# deploy-app.yml - Build, publish, and deploy WebApp + ApiApp to Azure App Service
# Auth: OIDC federated credentials (no AZURE_CREDENTIALS secret)
#
# EF Core Migrations:
#   Migrations are applied at application startup via DbInitializer (already configured
#   in ApiApp/Program.cs). No separate migration step is needed in this workflow.
#   To run migrations manually against Azure SQL:
#     dotnet ef database update --project output/src/ApiApp -- --environment prod
#   Ensure the executor identity has db_owner on the target database.

name: Deploy Application

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - dev
                    - staging
                    - prod
    workflow_run:
        workflows: ["Build and Test"]
        types:
            - completed
        branches:
            - main

permissions:
    id-token: write # Required for OIDC
    contents: read

jobs:
    # Resolve the target environment for workflow_run triggers
    resolve-env:
        name: Resolve environment
        runs-on: ubuntu-latest
        outputs:
            environment: ${{ steps.set-env.outputs.environment }}
            should_deploy: ${{ steps.set-env.outputs.should_deploy }}
        steps:
            - name: Set environment
              id: set-env
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
                    echo "should_deploy=true" >> "$GITHUB_OUTPUT"
                  elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
                    echo "environment=dev" >> "$GITHUB_OUTPUT"
                    echo "should_deploy=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "environment=dev" >> "$GITHUB_OUTPUT"
                    echo "should_deploy=false" >> "$GITHUB_OUTPUT"
                  fi

    deploy:
        name: Deploy (${{ needs.resolve-env.outputs.environment }})
        needs: resolve-env
        if: needs.resolve-env.outputs.should_deploy == 'true'
        runs-on: ubuntu-latest
        environment: ${{ needs.resolve-env.outputs.environment }}

        env:
            TARGET_ENV: ${{ needs.resolve-env.outputs.environment }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET 10
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - name: Cache NuGet packages
              uses: actions/cache@v4
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget-

            - name: Publish ApiApp
              run: |
                  dotnet publish output/src/ApiApp/ApiApp.csproj \
                    --configuration Release \
                    --output ./publish/api

            - name: Publish WebApp
              run: |
                  dotnet publish output/src/WebApp/WebApp.csproj \
                    --configuration Release \
                    --output ./publish/web

            - name: Login to Azure (OIDC)
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Deploy ApiApp to Azure App Service
              uses: azure/webapps-deploy@v3
              with:
                  app-name: api-accessdbapp-${{ env.TARGET_ENV }}
                  package: ./publish/api

            - name: Deploy WebApp to Azure App Service
              uses: azure/webapps-deploy@v3
              with:
                  app-name: app-accessdbapp-${{ env.TARGET_ENV }}
                  package: ./publish/web
