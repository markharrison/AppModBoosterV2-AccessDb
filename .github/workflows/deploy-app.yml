# deploy-app.yml — Deploys both API App and Web App to Azure App Service

name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      app-name:
        description: "Application name prefix"
        required: false
        default: "northwind2"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build API App
        run: dotnet build output/src/ApiApp/ApiApp.csproj --configuration Release

      - name: Restore and build Web App
        run: dotnet build output/src/WebApp/WebApp.csproj --configuration Release

      - name: Run unit tests
        run: dotnet test output/test/unit/ApiApp.Tests.csproj --configuration Release --verbosity normal

      - name: Publish API App
        run: dotnet publish output/src/ApiApp/ApiApp.csproj --configuration Release --output ./publish/api

      - name: Publish Web App
        run: dotnet publish output/src/WebApp/WebApp.csproj --configuration Release --output ./publish/web

      - name: Upload API App artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./publish/api

      - name: Upload Web App artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ./publish/web

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Download API App artifact
        uses: actions/download-artifact@v4
        with:
          name: api-app
          path: ./deploy/api

      - name: Download Web App artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./deploy/web

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-${{ inputs.app-name }}-api-${{ inputs.environment }}
          package: ./deploy/api

      - name: Deploy Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-${{ inputs.app-name }}-web-${{ inputs.environment }}
          package: ./deploy/web

      - name: Verify API App health
        shell: pwsh
        run: |
          $apiUrl = "https://app-${{ inputs.app-name }}-api-${{ inputs.environment }}.azurewebsites.net/health"
          Write-Host "Checking API health at $apiUrl..."
          $retries = 0
          $maxRetries = 10
          $delay = 15
          while ($retries -lt $maxRetries) {
            try {
              $response = Invoke-WebRequest -Uri $apiUrl -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "API App is healthy (HTTP 200)." -ForegroundColor Green
                exit 0
              }
            } catch {
              Write-Host "Attempt $($retries + 1)/$maxRetries - waiting ${delay}s..."
            }
            Start-Sleep -Seconds $delay
            $retries++
          }
          Write-Host "WARNING: API health check did not return 200 after $maxRetries attempts." -ForegroundColor Yellow
          Write-Host "The deployment completed but the app may still be starting up."
